services:
  - type: web
    name: fairsquare-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GOOGLE_API_KEY
        sync: false  # set manually in Render dashboard
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
    plan: free

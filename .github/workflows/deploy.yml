# DISABLED — Railway is deployed via GitHub App integration (auto-deploy on push to main)
# To re-enable CLI-based deploy, restore the 'on:' trigger and set RAILWAY_TOKEN secret.

name: Deploy to Railway

on:
  workflow_dispatch:  # manual only — auto-deploy handled by Railway GitHub App

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach --service FairSquare
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

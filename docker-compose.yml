version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4-alpine   # PostGIS for geospatial queries
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fairsquare}
      POSTGRES_USER: ${POSTGRES_USER:-fairsquare_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      retries: 5

  # ── FastAPI backend ────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file: .env
    environment:
      POSTGRES_HOST: db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src       # hot-reload in dev
      - ./data:/app/data
      - ./models:/app/models

  # ── Streamlit frontend ─────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  postgres_data:
